<div class="top-navbar glass-navbar py-2 px-3 mb-4 d-flex flex-wrap gap-2 justify-content-center justify-content-md-start blur-shadow">
    <app-main-game-button></app-main-game-button>
</div>

<div class="container d-flex flex-column align-items-center mb-5">
    <div class="settings-header mt-2 mb-4">
        <h3 class="display-6 fw-bold text-white game-heading">
            <ng-icon name="bootstrapGear" class="me-2"></ng-icon>
            {{ 'settings.label' | translate }}
        </h3>
    </div>
    
    <div class="settings-card glass-panel p-4 rounded-4 w-100" style="max-width: 600px;">
        <div class="row g-4 text-white">
            <div class="col-12 settings-row border-bottom border-secondary pb-3">
                <app-theme-selector></app-theme-selector>
            </div>
            
            <div class="col-12 settings-row border-bottom border-secondary pb-3">
                <div class="d-flex justify-content-between align-items-start">
                    <label class="form-check-label fw-semibold text-start">{{ 'settings.defaultGender.title' | translate }}</label>
                    <div class="d-flex flex-column gap-2 text-start">
                        <div class="form-check custom-radio">
                            <input class="form-check-input" type="radio" name="genderOptions" [value]="'male'" [checked]="(settings$ | async)?.defaultGender === 'male'" (change)="onSelectGender('male')" id="maleOption">
                            <label class="form-check-label" for="maleOption">{{ 'settings.defaultGender.male' | translate }}</label>
                        </div>
                        <div class="form-check custom-radio">
                            <input class="form-check-input" type="radio" name="genderOptions" [value]="'female'" [checked]="(settings$ | async)?.defaultGender === 'female'" (change)="onSelectGender('female')" id="femaleOption">
                            <label class="form-check-label" for="femaleOption">{{ 'settings.defaultGender.female' | translate }}</label>
                        </div>
                        <div class="form-check custom-radio">
                            <input class="form-check-input" type="radio" name="genderOptions" [value]="'always-choose'" [checked]="(settings$ | async)?.defaultGender === 'always-choose'" (change)="onSelectGender('always-choose')" id="alwaysChooseOption">
                            <label class="form-check-label" for="alwaysChooseOption">{{ 'settings.defaultGender.always-choose' | translate }}</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 settings-row border-bottom border-secondary pb-3">
                <div class="form-switch d-flex justify-content-between align-items-center">
                    <label class="form-check-label fw-semibold" for="explanationsSwitch">{{ 'settings.explanations' | translate }}</label>
                    <input class="form-check-input switch-lg" type="checkbox" [checked]="(settings$ | async)?.lessExplanations" (change)="onToggleVerbosity()" id="explanationsSwitch">
                </div>
            </div>
            <div class="col-12 settings-row border-bottom border-secondary pb-3">
                <div class="form-switch d-flex justify-content-between align-items-center">
                    <label class="form-check-label fw-semibold" for="muteAudioSwitch">{{ 'settings.muteAudio' | translate }}</label>
                    <input class="form-check-input switch-lg" type="checkbox" [checked]="(settings$ | async)?.muteAudio" (change)="onToggleMuteAudio()" id="muteAudioSwitch">
                </div>
            </div>
            <div class="col-12 settings-row border-bottom border-secondary pb-3">
                <div class="form-switch d-flex justify-content-between align-items-center">
                    <label class="form-check-label fw-semibold" for="skipShinySwitch">{{ 'settings.skipShinyRolls' | translate }}</label>
                    <input class="form-check-input switch-lg" type="checkbox" [checked]="(settings$ | async)?.skipShinyRolls" (change)="onToggleSkipShinyRolls()" id="skipShinySwitch">
                </div>
            </div>
            <div class="col-12 settings-row border-bottom border-secondary pb-3">
                <div class="form-switch d-flex justify-content-between align-items-center">
                    <label class="form-check-label fw-semibold" for="skipMegaAnimationSwitch">{{ 'settings.skipMegaAnimation' | translate }}</label>
                    <input class="form-check-input switch-lg" type="checkbox" [checked]="(settings$ | async)?.skipMegaEvolutionAnimation" (change)="onToggleSkipMegaEvolutionAnimation()" id="skipMegaAnimationSwitch">
                </div>
            </div>
            <div class="col-12 settings-row border-0 pt-3">
                <app-language-selector></app-language-selector>
            </div>
        </div>
    </div>
</div>
