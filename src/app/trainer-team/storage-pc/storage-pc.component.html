<button type="button" class="btn btn-game w-100" [ngClass]="(darkMode | async) ? 'btn-outline-light' : 'btn-outline-dark'"
  (click)="showPCModal()">
  <ng-icon name="bootstrapPcDisplayHorizontal" class="me-1"></ng-icon>
  {{ 'trainer.storage.access' | translate }}
</button>

<ng-template #pcStorageModal let-modal>
  <div class="glass-panel text-white p-4">
    <div class="modal-body p-0" cdkDropListGroup>
      <h2 class="game-heading fs-4 mb-3">{{ 'trainer.storage.team' | translate }}</h2>
      <div  id="trainerTeam"
            cdkDropList
            cdkDropListOrientation="mixed"
            [cdkDropListData]="trainerTeam"
            class="pokemon-storage-grid mb-4"
            (cdkDropListDropped)="drop($event)"
            [cdkDropListEnterPredicate]="teamIsFullPredicate">
            @for (pokemon of trainerTeam; track pokemon) {
              <div  class="pokemon-storage-card slot-box"
                    cdkDrag>
                <img class="img-fluid" [src]="getSprite(pokemon)">
              </div>
            }
      </div>
      <h2 class="game-heading fs-4 mb-3">{{ 'trainer.storage.stored' | translate }}</h2>
      <div  id="storedPokemon"
            cdkDropList
            cdkDropListOrientation="mixed"
            [cdkDropListData]="storedPokemon"
            class="pokemon-storage-grid"
            (cdkDropListDropped)="drop($event)"
            [cdkDropListEnterPredicate]="lastPokemonPredicate">
        @for (pokemon of storedPokemon; track pokemon) {
          <div  class="pokemon-storage-card slot-box"
                [cdkDragData]="pokemon"
                cdkDrag>
            <img [src]="getSprite(pokemon)" class="img-fluid">
          </div>
        }
      </div>
    </div>
    <div class="modal-footer border-0 mt-3 p-0">
      <button type="button" class="btn btn-game btn-danger text-white rounded-pill px-4" (click)="logOut()">
        <ng-icon name="bootstrapPower" class="me-2"></ng-icon>
        {{ 'trainer.storage.logout' | translate }}
      </button>
    </div>
  </div>
</ng-template>

<ng-template #pcInfoModal let-modal>
  <div class="modal-body">
      <h1>{{ infoModalTitle | translate}}</h1>
      <div class="explain-panel">
          <div class="message">
              <p>{{ infoModalMessage | translate}}</p>
          </div>
      </div>
  </div>
  <div class="modal-footer">
      <button type="button" class="btn btn-outline-primary" (click)="closeModal()">Ok</button>
  </div>
</ng-template>
